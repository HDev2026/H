<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover" />
<title>   0   </title>

<style>
:root{
  --bg:#0f172a;
  --header:#1e293b;
  --footer:#1e293b;
  --mine:#065f46;
  --other:#1f2937;
  --border:#334155;
  --text:#ffffff;
  --muted:#cbd5e1;
  --safe-top:env(safe-area-inset-top, 0px);
  --safe-bottom:env(safe-area-inset-bottom, 0px);
  --reply-accent:#86efac;
  --header-total-h:72px;
  --composer-total-h:88px;
}

*{
  box-sizing:border-box;
  margin:0;
  padding:0;
}

html,body{
  width:100%;
  height:100%;
  overflow:hidden;
  background:var(--bg);
  font-family:tahoma,sans-serif;
  color:var(--text);
  -webkit-text-size-adjust:100%;
  overscroll-behavior:none;
}

body{
  position:fixed;
  inset:0;
  touch-action:none;
}

button,
input,
textarea{
  font-family:inherit;
}

.hidden{
  display:none !important;
}

.app{
  position:fixed;
  inset:0;
  width:100%;
  height:100%;
  overflow:hidden;
  background:
    linear-gradient(rgba(15,23,42,.97), rgba(15,23,42,.97)),
    radial-gradient(circle at top right, rgba(37,99,235,.18), transparent 30%);
}

/* header fixed */
header{
  position:fixed;
  top:0;
  left:0;
  right:0;
  z-index:50;
  background:var(--header);
  border-bottom:1px solid var(--border);
  padding-top:var(--safe-top);
}

.header-inner{
  min-height:56px;
  display:flex;
  align-items:center;
  justify-content:center;
  padding:0 14px;
  font-size:18px;
  font-weight:bold;
}

.header-action-btn{
  position:absolute;
  left:14px;
  top:50%;
  transform:translateY(-50%);
  width:38px;
  height:38px;
  border:none;
  border-radius:50%;
  background:rgba(255,255,255,.08);
  color:#fff;
  font-size:18px;
  cursor:pointer;
  display:flex;
  align-items:center;
  justify-content:center;
}

/* messages only scroll */
.messages{
  position:fixed;
  top:var(--header-total-h);
  left:0;
  right:0;
  bottom:var(--composer-total-h);
  overflow-y:auto;
  overflow-x:hidden;
  padding:14px 10px;
  display:flex;
  flex-direction:column;
  gap:10px;
  background:transparent;
  -webkit-overflow-scrolling:touch;
  overscroll-behavior-y:contain;
  overscroll-behavior-x:none;
  touch-action:pan-y;
}

/* message wrappers */
.msg-wrap{
  display:flex;
  flex-direction:column;
  gap:4px;
  position:relative;
  transition:transform .16s ease;
  will-change:transform;
}

.msg-wrap.jump-highlight .msg{
  outline:2px solid rgba(134,239,172,.95);
  outline-offset:2px;
}

.msg-wrap.me{
  align-items:flex-end;
}

.msg-wrap.other{
  align-items:flex-start;
}

.reply-hint{
  position:absolute;
  top:50%;
  transform:translateY(-50%);
  opacity:0;
  transition:opacity .12s ease;
  font-size:18px;
  pointer-events:none;
}

.msg-wrap.swiping .reply-hint{
  opacity:1;
}

.msg-wrap.me .reply-hint{
  right:-24px;
}

.msg-wrap.other .reply-hint{
  left:-24px;
}

.msg{
  max-width:80%;
  padding:10px 12px 8px;
  border-radius:16px;
  word-break:break-word;
  overflow-wrap:anywhere;
  position:relative;
  box-shadow:0 6px 14px rgba(0,0,0,.16);

  -webkit-user-select: none;
  user-select: none;
  -webkit-touch-callout: none;
}

.msg.me{
  background:var(--mine);
  border-bottom-right-radius:6px;
}

.msg.other{
  background:var(--other);
  border-bottom-left-radius:6px;
}

.reply-box{
  background:rgba(255,255,255,.11);
  border-right:3px solid var(--reply-accent);
  border-radius:10px;
  padding:7px 9px;
  margin-bottom:8px;
  font-size:12px;
  overflow:hidden;
}

.reply-name{
  font-weight:bold;
  margin-bottom:3px;
}

.reply-text{
  white-space:nowrap;
  overflow:hidden;
  text-overflow:ellipsis;
  opacity:.95;
}

.msg-text{
  white-space:pre-wrap;
  line-height:1.45;
  font-size:15px;
  
  -webkit-user-select: none;
  user-select: none;
}

.msg-meta{
  margin-top:6px;
  display:flex;
  justify-content:flex-end;
  gap:6px;
  font-size:11px;
  color:rgba(255,255,255,.82);
}

.msg-media{
  padding:4px 2px 2px;
}
.msg-media-wrap{
  position:relative;
  display:inline-block;
}

.media-expand-btn{
  position:absolute;
  top:8px;
  left:8px;
  width:34px;
  height:34px;
  border:none;
  border-radius:50%;
  background:rgba(0,0,0,.5);
  color:#fff;
  font-size:18px;
  line-height:1;
  display:flex;
  align-items:center;
  justify-content:center;
  cursor:pointer;
  z-index:5;
}
.msg-image{
  max-width:220px;
  border-radius:10px;
  display:block;
  -webkit-user-drag:none;
  user-select:none;
}

.msg-video{
  max-width:220px;
  border-radius:10px;
  display:block;
}

.msg-audio{
  width:220px;
}

.msg-file{
  font-size:14px;
}


.msg-status{
  font-size:11px;
  color:#94a3b8;
  margin-top:4px;
}
  
/* composer fixed */
.composer-shell{
  position:fixed;
  left:0;
  right:0;
  bottom:0;
  z-index:50;
  background:var(--footer);
  border-top:1px solid var(--border);
  padding-bottom:var(--safe-bottom);
}

.reply-preview{
  padding:8px 10px 0;
}
.attachment-preview{
  padding:8px 10px 0;
}

.recording-preview{
  padding:8px 10px 0;
}

.recording-preview-box{
  display:flex;
  align-items:center;
  justify-content:space-between;
  gap:10px;
  background:#111827;
  border:1px solid rgba(255,255,255,.07);
  border-radius:12px;
  padding:10px 12px;
}

.recording-preview-main{
  min-width:0;
  flex:1;
  display:flex;
  align-items:center;
  gap:10px;
}

.recording-dot{
  width:10px;
  height:10px;
  border-radius:50%;
  background:#ef4444;
  flex:0 0 10px;
  animation:recordPulse 1s infinite;
}

.recording-label{
  font-size:13px;
  font-weight:bold;
  color:#fff;
  white-space:nowrap;
}

.recording-time{
  font-size:13px;
  color:var(--muted);
  white-space:nowrap;
}

.recording-cancel{
  background:transparent;
  border:none;
  color:#fff;
  font-size:18px;
  line-height:1;
  cursor:pointer;
  padding:0;
}

@keyframes recordPulse{
  0%{ opacity:1; }
  50%{ opacity:.45; }
  100%{ opacity:1; }
}

.attachment-preview-box{
  display:flex;
  align-items:flex-start;
  justify-content:space-between;
  gap:10px;
  background:#111827;
  border:1px solid rgba(255,255,255,.07);
  border-radius:12px;
  padding:10px 12px;
}

.attachment-preview-main{
  min-width:0;
  flex:1;
  display:flex;
  flex-direction:column;
  gap:8px;
}

.attachment-preview-title{
  font-size:12px;
  font-weight:bold;
  color:var(--muted);
}

.attachment-preview-meta{
  font-size:13px;
  color:#fff;
  white-space:nowrap;
  overflow:hidden;
  text-overflow:ellipsis;
}

.attachment-preview-close{
  background:transparent;
  border:none;
  color:#fff;
  font-size:18px;
  line-height:1;
  cursor:pointer;
  padding:0;
}

.attachment-preview-thumb{
  max-width:120px;
  max-height:90px;
  border-radius:10px;
  display:block;
  object-fit:cover;
  border:1px solid rgba(255,255,255,.08);
}

.attachment-preview-video{
  width:160px;
  max-width:100%;
  max-height:120px;
  border-radius:10px;
  display:block;
  background:#000;
  border:1px solid rgba(255,255,255,.08);
}

.attachment-preview-audio{
  width:220px;
  max-width:100%;
  display:block;
}

.reply-preview-box{
  display:flex;
  align-items:flex-start;
  justify-content:space-between;
  gap:10px;
  background:#111827;
  border:1px solid rgba(255,255,255,.07);
  border-right:4px solid var(--reply-accent);
  border-radius:12px;
  padding:10px 12px;
}

.reply-preview-main{
  min-width:0;
  flex:1;
}

.reply-preview-title{
  font-size:12px;
  font-weight:bold;
  margin-bottom:4px;
}

.reply-preview-text{
  font-size:12px;
  color:var(--muted);
  white-space:nowrap;
  overflow:hidden;
  text-overflow:ellipsis;
}

.media-viewer{
  position:fixed;
  inset:0;
  background:rgba(0,0,0,.88);
  display:flex;
  align-items:center;
  justify-content:center;
  padding:20px;
  z-index:2000;
}

.media-viewer-content{
  display:flex;
  align-items:center;
  justify-content:center;
  width:100%;
  height:100%;
}

.media-viewer-image,
.media-viewer-video{
  max-width:95vw;
  max-height:90vh;
  border-radius:14px;
  display:block;
  box-shadow:0 20px 60px rgba(0,0,0,.5);
}

.media-viewer-close{
  position:absolute;
  top:max(18px, env(safe-area-inset-top, 0px));
  right:18px;
  width:44px;
  height:44px;
  border:none;
  border-radius:50%;
  background:rgba(255,255,255,.14);
  color:#fff;
  font-size:28px;
  line-height:1;
  display:flex;
  align-items:center;
  justify-content:center;
  cursor:pointer;
  z-index:2100;
}

.msg-media + .msg-text,
.msg-file + .msg-text{
  margin-top:6px;
}
  
.reply-close{
  background:transparent;
  border:none;
  color:#fff;
  font-size:18px;
  line-height:1;
  cursor:pointer;
  padding:0;
}

footer{
  min-height:76px;
  display:flex;
  gap:8px;
  padding:10px;
  background:var(--footer);
  align-items:flex-end;
  flex-wrap:nowrap;
  min-width:0;
  width:100%;
  max-width:100%;
  overflow:hidden;
}
  
textarea{
  flex:1;
  min-width:0;
  min-height:48px;
  max-height:96px;
  border:none;
  outline:none;
  border-radius:14px;
  padding:12px 14px;
  font-size:16px;
  background:#fff;
  color:#111827;
  resize:none;
  overflow-y:auto;
  line-height:1.45;
  white-space:pre-wrap;
  word-break:break-word;
}

button.send-btn{
  flex:0 0 auto;
  width:48px;
  min-width:48px;
  height:48px;
  border:none;
  border-radius:50%;
  background:#065f46;
  color:#fff;
  display:flex;
  align-items:center;
  justify-content:center;
  cursor:pointer;
  padding:0;
}

button.send-btn svg{
  width:22px;
  height:22px;
  display:block;
  fill:none;
  stroke:currentColor;
  stroke-width:2;
  stroke-linecap:round;
  stroke-linejoin:round;
}

.attach-btn{
  flex:0 0 auto;
  width:48px;
  height:48px;
  border:none;
  border-radius:50%;
  background:#111827;
  color:#fff;
  font-size:28px;
  line-height:1;
  display:flex;
  align-items:center;
  justify-content:center;
  cursor:pointer;
}

.attach-overlay{
  position:fixed;
  inset:0;
  background:rgba(0,0,0,.58);
  backdrop-filter:blur(6px);
  -webkit-backdrop-filter:blur(6px);
  display:none;
  align-items:flex-end;
  justify-content:center;
  padding:16px;
  z-index:1100;
}

.attach-sheet{
  width:min(260px, calc(100% - 40px));
  background:#111827;
  border:1px solid rgba(255,255,255,.08);
  border-radius:14px;
  overflow:hidden;
  box-shadow:0 20px 50px rgba(0,0,0,.35);
}

.attach-head{
  display:none;
}

.attach-option{
  width:100%;
  background:transparent;
  border:none;
  color:#fff;
  display:flex;
  align-items:center;
  justify-content:flex-start;
  gap:8px;
  text-align:right;
  padding:11px 12px;
  font-size:14px;
  cursor:pointer;
  border-bottom:1px solid rgba(255,255,255,.06);
  flex-direction:row-reverse;
}

.attach-option:last-child{
  border-bottom:none;
}

.attach-option-icon{
  width:18px;
  display:inline-flex;
  align-items:center;
  justify-content:center;
  font-size:16px;
}

.attach-option-text{
  white-space:nowrap;
}

@media (max-width:420px){
  .attach-btn{
    width:46px;
    height:46px;
    font-size:26px;
  }
}

/* menu */
.menu-overlay{
  position:fixed;
  inset:0;
  background:rgba(0,0,0,.72);
  backdrop-filter:blur(8px);
  -webkit-backdrop-filter:blur(8px);
  display:none;
  align-items:center;
  justify-content:center;
  padding:16px;
  z-index:1000;

  -webkit-user-select:none;
  user-select:none;
  -webkit-touch-callout:none;
}

.menu-center{
  width:min(260px, calc(100% - 40px));
  display:flex;
  flex-direction:column;
  gap:8px;
  margin-inline:auto;
}
  
.menu-message-preview{
  display:flex;
  justify-content:flex-end;
  width:100%;
  pointer-events:none;
}

.menu-message-preview .preview-bubble{
  max-width:74%;
  max-height:170px;
  padding:9px 11px 8px;
  border-radius:15px;
  box-shadow:0 10px 24px rgba(0,0,0,.28);
  word-break:break-word;
  overflow-wrap:anywhere;
  overflow-y:auto;
}

.menu-message-preview .preview-bubble.me{
  background:var(--mine);
  border-bottom-right-radius:6px;
}

.menu-message-preview .preview-bubble.other{
  background:var(--other);
  border-bottom-left-radius:6px;
}

.menu-message-preview .preview-text{
  white-space:pre-wrap;
  line-height:1.45;
  font-size:15px;

  -webkit-user-select:none;
  user-select:none;
  -webkit-touch-callout:none;
}

.menu-message-preview .preview-meta{
  margin-top:6px;
  display:flex;
  justify-content:flex-end;
  font-size:11px;
  color:rgba(255,255,255,.82);
}

.menu-sheet{
  width:100%;
  background:#111827;
  border:1px solid rgba(255,255,255,.08);
  border-radius:14px;
  overflow:hidden;
  box-shadow:0 20px 50px rgba(0,0,0,.35);

  -webkit-user-select:none;
  user-select:none;
  -webkit-touch-callout:none;
}

.menu-head{
  display:none;
}
  
.menu-btn{
  width:100%;
  background:transparent;
  border:none;
  color:#fff;
  display:flex;
  align-items:center;
  justify-content:space-between;
  text-align:right;
  padding:13px 18px;
  font-size:14px;
  cursor:pointer;
  border-bottom:1px solid rgba(255,255,255,.06);

  -webkit-user-select:none;
  user-select:none;
  -webkit-touch-callout:none;
}

.menu-btn-label{
  display:flex;
  align-items:center;
  gap:8px;
  min-width:0;
}

.menu-btn-icon{
  width:16px;
  height:16px;
  flex:0 0 16px;
  display:inline-flex;
  align-items:center;
  justify-content:center;
  opacity:.95;
}

.menu-btn-icon svg{
  width:18px;
  height:18px;
  display:block;
  fill:none;
  stroke:currentColor;
  stroke-width:1.9;
  stroke-linecap:round;
  stroke-linejoin:round;
}

.menu-btn-text{
  white-space:nowrap;
}

.menu-btn:last-child{
  border-bottom:none;
}

.menu-btn.danger{
  color:#fca5a5;
}
@media (max-width:420px){
  .header-inner{
    min-height:54px;
    font-size:17px;
  }

  .msg{
    max-width:86%;
  }

  textarea{
    min-height:46px;
  }  

  .send-btn{
    width:46px;
    min-width:46px;
    height:46px;
  }
  .messages{
    -webkit-user-select: none;
    user-select: none;
  }
}

.lock-screen{
  position:fixed;
  inset:0;
  z-index:5000;
  background:linear-gradient(rgba(15,23,42,.98), rgba(15,23,42,.98));
  display:flex;
  align-items:center;
  justify-content:center;
  padding:20px;
}

.lock-screen.hidden{
  display:none !important;
}

.lock-card{
  width:min(360px, 100%);
  background:#111827;
  border:1px solid rgba(255,255,255,.08);
  border-radius:20px;
  padding:22px 18px;
  box-shadow:0 20px 60px rgba(0,0,0,.35);
  text-align:center;
}

.lock-title{
  font-size:22px;
  font-weight:bold;
  margin-bottom:8px;
}

.lock-subtitle{
  font-size:14px;
  color:var(--muted);
  margin-bottom:18px;
}

.lock-dots{
  display:flex;
  justify-content:center;
  gap:10px;
  margin-bottom:14px;
}

.lock-dot{
  width:14px;
  height:14px;
  border-radius:50%;
  border:2px solid rgba(255,255,255,.35);
  background:transparent;
}

.lock-dot.filled{
  background:#fff;
  border-color:#fff;
}

.lock-error{
  min-height:22px;
  font-size:13px;
  color:#fca5a5;
  margin-bottom:10px;
}

.lock-pad{
  display:grid;
  grid-template-columns:repeat(3, 1fr);
  gap:10px;
  margin-top:8px;
}

.lock-key{
  height:58px;
  border:none;
  border-radius:14px;
  background:#1f2937;
  color:#fff;
  font-size:22px;
  cursor:pointer;
}

.lock-key-action{
  font-size:18px;
}
  
</style>
</head>
<body>

<div class="app">
  <header id="chatHeader">
    <div class="header-inner">
      <button id="settingsBtn" class="header-action-btn" style="left:14px" type="button" aria-label="الإعدادات">⚙️</button>
      <button id="refreshBtn" class="header-action-btn" style="left:56px" type="button" aria-label="تحديث">↻</button>
      <button id="logoutBtn" class="header-action-btn" style="left:98px" type="button" aria-label="تسجيل الخروج">⎋</button>
      <span>🤍</span>
    </div>
  </header>

  <div class="messages" id="messages"></div>

  <div class="composer-shell" id="composerShell">
    <div class="reply-preview hidden" id="replyPreview"></div>
    <div class="attachment-preview hidden" id="attachmentPreview"></div>
    <div class="recording-preview hidden" id="recordingPreview"></div>

    <footer>
      <input id="imagePicker" type="file" accept="image/*" class="hidden" />
      <input id="videoPicker" type="file" accept="video/*" class="hidden" />
      <input id="filePicker" type="file" class="hidden" />
      <input id="audioPicker" type="file" accept="audio/*" class="hidden" />
    
      <button class="attach-btn" id="attachBtn" type="button" aria-label="إضافة مرفق">+</button>
      <textarea id="text" placeholder="اكتب رسالة..." rows="1"></textarea>
      <button class="send-btn" id="sendBtn" type="button" aria-label="إرسال أو تسجيل صوت"></button>
    </footer>
  </div>
</div>

<div class="menu-overlay" id="menuOverlay">
  <div class="menu-center">
    <div class="menu-message-preview" id="menuMessagePreview"></div>

    <div class="menu-sheet">
      <div class="menu-head" id="menuHead">خيارات الرسالة</div>
      <div id="menuActions"></div>
    </div>
  </div>
  </div>
    <div class="attach-overlay" id="attachOverlay">
    <div class="attach-sheet">
      <div class="attach-head">إرسال مرفق</div>
  
      <button class="attach-option" type="button" data-kind="image">
        <span class="attach-option-icon">🖼️</span>
        <span class="attach-option-text">صورة</span>
      </button>
  
      <button class="attach-option" type="button" data-kind="video">
        <span class="attach-option-icon">🎥</span>
        <span class="attach-option-text">فيديو</span>
      </button>
  
      <button class="attach-option" type="button" data-kind="file">
        <span class="attach-option-icon">📎</span>
        <span class="attach-option-text">ملف</span>
      </button>
  
      <button class="attach-option" type="button" data-kind="audio">
        <span class="attach-option-icon">🎤</span>
        <span class="attach-option-text">ملف صوت</span>
      </button>
    </div>
  </div>
  
  <div class="media-viewer hidden" id="mediaViewer">
    <button class="media-viewer-close" id="mediaViewerClose" type="button" aria-label="إغلاق">×</button>
    <div class="media-viewer-content" id="mediaViewerContent"></div>
  </div>

async function hydrateMissingReplyTargets(rows) {
  const missingIds = [...new Set(
    rows
      .map(row => row.reply_to_id)
      .filter(Boolean)
      .filter(id => !getMsgById(id) && !replyCache.has(String(id)))
  )];

  if (missingIds.length === 0) return;

  const { data: replyRows, error } = await sb
    .from('chat_messages')
    .select('id, user_id, content')
    .in('id', missingIds);

  if (error || !replyRows) return;

  for (const row of replyRows) {

  if (msg.status === 'sending') {

  }

  if (msg.type === 'image') {
    return `

        <img src="${msg.file}" class="msg-image" data-full-image="${msg.file}">
      </div>
      ${textHtml}

  if (msg.type === 'video') {

      ${textHtml}

    return `
      <div class="msg-media">
        <audio src="${msg.file}" controls class="msg-audio"></audio>
      </div>
      ${textHtml}
      ${statusHtml}

  if (msg.type === 'file') {
    return `
      <div class="msg-file">
        📎 ${escapeHtml(msg.fileName || 'ملف')}
      </div>
      ${textHtml}
      ${statusHtml}
    `;
  }

  return `
    ${textHtml || `<div class="msg-text"></div>`}
    ${statusHtml}
  `;
}

function preloadImage(src) {
  return new Promise((resolve, reject) => {
    if (!src) {
      reject(new Error('No image src'));
      return;
    }

    const img = new Image();
    img.onload = () => resolve(src);
    img.onerror = reject;
    img.src = src;
  });
}

function pinToBottomAfterMediaLoads(container) {
  const mediaEls = container.querySelectorAll('img, video');
  if (!mediaEls.length) return;

  const stickToBottom = () => {
    messagesEl.scrollTop = messagesEl.scrollHeight;

    requestAnimationFrame(() => {
      messagesEl.scrollTop = messagesEl.scrollHeight;
    });
  };

  mediaEls.forEach((el) => {
    if (el.tagName === 'IMG') {
      if (!el.complete) {
        el.addEventListener('load', stickToBottom, { once: true });
      }
    }

    if (el.tagName === 'VIDEO') {
      if (el.readyState < 1) {
        el.addEventListener('loadedmetadata', stickToBottom, { once: true });
      }
      if (el.readyState < 2) {
        el.addEventListener('loadeddata', stickToBottom, { once: true });
      }
    }
  });
}

async function createSignedAttachmentUrl(path) {
  if (!path) return '';

  const cached = signedUrlCache.get(path);
  if (cached) return cached;

  const { data, error } = await sb
    .storage
    .from('chat')
    .createSignedUrl(path, 3600);

  if (error) {
    console.error('Signed URL error:', error);
    return '';
  }

  const url = data?.signedUrl || '';
  if (url) {
    signedUrlCache.set(path, url);
  }

  return url;
}

    return {
      ...msg,
      file: signedUrl || msg.file
    };
  }

  return msg;
}

function insertMessageInOrder(msg) {
  const exists = data.some(m => String(m.id) === String(msg.id));
  if (exists) return;

  const msgTime = new Date(msg.createdAt).getTime();

  let insertIndex = data.findIndex(existing => {
    return new Date(existing.createdAt).getTime() > msgTime;
  });

  if (insertIndex === -1) {
    data.push(msg);
    appendMessageToUI(msg);
    return;
  }

  data.splice(insertIndex, 0, msg);

  const wrap = document.createElement('div');
  wrap.className = `msg-wrap ${msg.mine ? 'me' : 'other'}`;
  wrap.dataset.id = String(msg.id);

  wrap.innerHTML = `
    <div class="reply-hint">↩️</div>
    <div class="msg ${msg.mine ? 'me' : 'other'}">
      ${renderReplySnippet(msg)}
      ${renderMessageContent(msg)}
      <div class="msg-meta">
        ${msg.edited ? '<span>(تم التعديل)</span>' : ''}
        <span>${escapeHtml(msg.time)}</span>
      </div>
    </div>
  `;

  bindInteractions(wrap, msg);

  const replyJumpEl = wrap.querySelector('[data-jump-to]');
  if (replyJumpEl) {
    replyJumpEl.style.cursor = 'pointer';
    replyJumpEl.addEventListener('click', (e) => {
      e.stopPropagation();
      jumpToMessage(replyJumpEl.dataset.jumpTo);
    });
  }

  const imageEl = wrap.querySelector('[data-full-image]');
  if (imageEl) {
    imageEl.addEventListener('click', () => {
      openMediaViewer('image', imageEl.dataset.fullImage);
    });
  }

  const openVideoBtn = wrap.querySelector('[data-open-video]');
  if (openVideoBtn) {
    openVideoBtn.addEventListener('click', (e) => {
      e.stopPropagation();
      openMediaViewer('video', openVideoBtn.dataset.openVideo);
    });
  }

  const nextMsg = data[insertIndex + 1];
  if (!nextMsg) {
    messagesEl.appendChild(wrap);
    return;
  }

  const nextEl = messagesEl.querySelector(`.msg-wrap[data-id="${String(nextMsg.id)}"]`);
  if (nextEl) {
    messagesEl.insertBefore(wrap, nextEl);
  } else {
    messagesEl.appendChild(wrap);
  }
}

        <path d="M3 6h18"></path>
        <path d="M8 6V4h8v2"></path>
        <path d="M19 6l-1 14a2 2 0 0 1-2 2H8a2 2 0 0 1-2-2L5 6"></path>
        <path d="M10 11v6"></path>
        <path d="M14 11v6"></path>
      </svg>
    `;
  }

  return '';
}

function openAttachSheet() {

}

function closeAttachSheet() {

function openMediaViewer(type, src) {
  if (!src) return;

  if (type === 'video') {
    mediaViewerContent.innerHTML = `
      <video class="media-viewer-video" src="${src}" controls autoplay playsinline></video>
    `;
  } else {
    mediaViewerContent.innerHTML = `
      <img class="media-viewer-image" src="${src}" alt="عرض الوسائط">
    `;
  }

  mediaViewer.classList.remove('hidden');
}

function closeMediaViewer() {
  mediaViewerContent.innerHTML = '';
  mediaViewer.classList.add('hidden');
}

function formatRecordingTime(totalSeconds) {
  const mins = Math.floor(totalSeconds / 60);
  const secs = totalSeconds % 60;
  return `${String(mins).padStart(2, '0')}:${String(secs).padStart(2, '0')}`;
}

function stopMediaTracks() {
  if (mediaStream) {
    mediaStream.getTracks().forEach(track => track.stop());
    mediaStream = null;
  }
}

function updateRecordingPreview() {
  if (!isRecording) {
    recordingPreview.classList.add('hidden');
    recordingPreview.innerHTML = '';
    requestAnimationFrame(syncLayoutHeights);
    return;
  }

  recordingPreview.classList.remove('hidden');
  recordingPreview.innerHTML = `
    <div class="recording-preview-box">
      <div class="recording-preview-main">
        <span class="recording-dot"></span>
        <span class="recording-label">جارٍ تسجيل الصوت</span>
        <span class="recording-time">${formatRecordingTime(recordingSeconds)}</span>
      </div>
      <button class="recording-cancel" id="cancelRecordingBtn" type="button">×</button>
    </div>
  `;

  document.getElementById('cancelRecordingBtn').addEventListener('click', cancelRecording);
  requestAnimationFrame(syncLayoutHeights);
}

async function startRecording() {
  if (selectedAttachment) {
    clearSelectedAttachment();
  }

  if (editingId) {
    return;
  }

  try {
    mediaStream = await navigator.mediaDevices.getUserMedia({ audio: true });
    mediaRecorder = new MediaRecorder(mediaStream);
    recordedChunks = [];
    recordingSeconds = 0;

    mediaRecorder.addEventListener('dataavailable', (event) => {
      if (event.data && event.data.size > 0) {
        recordedChunks.push(event.data);
      }
    });

    mediaRecorder.addEventListener('stop', () => {
      const mimeType = mediaRecorder?.mimeType || 'audio/webm';
    
      if (isCancellingRecording) {
        isCancellingRecording = false;
        stopMediaTracks();
        mediaRecorder = null;
        recordedChunks = [];
        updateComposerActionButton();
        updateRecordingPreview();
        return;
      }
    
      const ext = mimeType.includes('ogg') ? 'ogg' : 'webm';
      const audioBlob = new Blob(recordedChunks, { type: mimeType });
      selectedAttachment = new File([audioBlob], `recording_${Date.now()}.${ext}`, { type: mimeType });
    
      updateAttachmentPreview();
      stopMediaTracks();
      mediaRecorder = null;
      recordedChunks = [];
      updateComposerActionButton();
    });

    mediaRecorder.start();
    isRecording = true;
    updateComposerActionButton();
    updateRecordingPreview();

    recordingTimer = setInterval(() => {
      recordingSeconds += 1;
      updateRecordingPreview();
    }, 1000);
  } catch (err) {
    alert('تعذر الوصول إلى الميكروفون');
    stopMediaTracks();
  }
}

function stopRecording() {
  if (!isRecording || !mediaRecorder) return;

  isRecording = false;

  if (recordingTimer) {
    clearInterval(recordingTimer);
    recordingTimer = null;
  }

  updateComposerActionButton();
  updateRecordingPreview();
  mediaRecorder.stop();
}

function cancelRecording() {
  if (!isRecording) return;

  isRecording = false;
  isCancellingRecording = true;

  if (recordingTimer) {
    clearInterval(recordingTimer);
    recordingTimer = null;
  }

  if (mediaRecorder && mediaRecorder.state !== 'inactive') {
    mediaRecorder.stop();
  } else {
    isCancellingRecording = false;
    stopMediaTracks();
    mediaRecorder = null;
    recordedChunks = [];
  }

  recordingSeconds = 0;
  clearSelectedAttachment();
  updateComposerActionButton();
  updateRecordingPreview();
}

function clearSelectedAttachment() {
  selectedAttachment = null;

  if (selectedAttachmentUrl) {
    URL.revokeObjectURL(selectedAttachmentUrl);
    selectedAttachmentUrl = '';
  }

  attachmentPreview.classList.add('hidden');
  attachmentPreview.innerHTML = '';

  if (!isRecording) {
    recordingPreview.classList.add('hidden');
    recordingPreview.innerHTML = '';
  }

  updateComposerActionButton();
  requestAnimationFrame(syncLayoutHeights);
}

function updateAttachmentPreview() {
  if (!selectedAttachment) {
    attachmentPreview.classList.add('hidden');
    attachmentPreview.innerHTML = '';
    requestAnimationFrame(syncLayoutHeights);
    return;
  }

  if (selectedAttachmentUrl) {
    URL.revokeObjectURL(selectedAttachmentUrl);
    selectedAttachmentUrl = '';
  }

  const file = selectedAttachment;
  const type = file.type || '';
  let previewMedia = '';

  if (type.startsWith('image/')) {
    selectedAttachmentUrl = URL.createObjectURL(file);
    previewMedia = `<img class="attachment-preview-thumb" src="${selectedAttachmentUrl}" alt="معاينة صورة">`;
  } else if (type.startsWith('video/')) {
    selectedAttachmentUrl = URL.createObjectURL(file);
    previewMedia = `<video class="attachment-preview-video" src="${selectedAttachmentUrl}" controls playsinline preload="metadata"></video>`;
  } else if (type.startsWith('audio/')) {
    selectedAttachmentUrl = URL.createObjectURL(file);
    previewMedia = `<audio class="attachment-preview-audio" src="${selectedAttachmentUrl}" controls preload="metadata"></audio>`;
  }
  attachmentPreview.classList.remove('hidden');
  attachmentPreview.innerHTML = `
    <div class="attachment-preview-box">
      <div class="attachment-preview-main">
        <div class="attachment-preview-title">مرفق جاهز للإرسال</div>
        ${previewMedia}
        <div class="attachment-preview-meta">${escapeHtml(file.name)}</div>
      </div>
      <button class="attachment-preview-close" id="clearAttachmentBtn" type="button">×</button>
    </div>
  `;

  document.getElementById('clearAttachmentBtn').addEventListener('click', clearSelectedAttachment);
  requestAnimationFrame(syncLayoutHeights);
}

function handlePickedFile(file) {
  if (!file) return;

  if (isRecording) {
    cancelRecording();
  }

  selectedAttachment = file;
  updateAttachmentPreview();
  updateComposerActionButton();
}

function getAttachmentTypeFromFile(file) {
  if (!file) return null;

  if (file.type.startsWith('image/')) return 'image';
  if (file.type.startsWith('video/')) return 'video';
  if (file.type.startsWith('audio/')) return 'audio';
  return 'file';
}

async function uploadAttachment(file) {
  if (!file) return null;

  const ext = file.name.includes('.') ? file.name.split('.').pop().toLowerCase() : 'bin';

  let contentType = file.type || '';

  if (!contentType) {
    if (ext === 'm4a') contentType = 'audio/mp4';
    else if (ext === 'aac') contentType = 'audio/aac';
    else if (ext === 'mp3') contentType = 'audio/mpeg';
    else if (ext === 'ogg') contentType = 'audio/ogg';
    else if (ext === 'webm') contentType = 'audio/webm';
    else if (ext === 'mp4') contentType = 'video/mp4';
    else if (ext === 'mov') contentType = 'video/quicktime';
    else if (ext === 'jpg' || ext === 'jpeg') contentType = 'image/jpeg';
    else if (ext === 'png') contentType = 'image/png';
  }

  const fileName = `${currentUserId}/${Date.now()}-${Math.random().toString(36).slice(2)}.${ext}`;

  const { error } = await sb
    .storage
    .from('chat')
    .upload(fileName, file, {
      cacheControl: '3600',
      upsert: false,
      contentType
    });

  if (error) {
    throw error;
  }

  return fileName;
}

async function copyMessage(id) {
  const msg = getMsgById(id);
  if (!msg) return;
  try {
    await navigator.clipboard.writeText(msg.text || '');
  } catch {
    alert('تعذر النسخ');
  }
}

function editMessage(id) {
  const msg = getMsgById(id);
  if (!msg || !msg.mine) return;

  editingId = id;
  clearReplyPreview();
  clearSelectedAttachment();
  input.value = msg.text;
  autoGrowTextarea();
  updateComposerActionButton();
  input.focus();
}

async function deleteMessage(id) {
  const idx = data.findIndex(m => String(m.id) === String(id));
  if (idx === -1) return;

  const msg = data[idx];
  if (!msg || !msg.mine) return;

  if (!confirm('هل تريد حذف الرسالة؟')) return;

  const attachmentPath = msg.attachmentPath || null;

  const { error } = await sb
    .from('chat_messages')
    .delete()
    .eq('id', id)
    .eq('user_id', currentUserId);

  if (error) {
    console.error('Delete error:', error);
    alert(error.message || 'فشل حذف الرسالة');
    return;
  }

  if (attachmentPath) {
    console.log('Deleting storage path:', attachmentPath);

    const { data: removedFiles, error: storageError } = await sb
      .storage
      .from('chat')
      .remove([attachmentPath]);

    console.log('Storage remove result:', removedFiles);

    if (storageError) {
      console.error('Storage delete error:', storageError);
    }
  }

  data.splice(idx, 1);
  removeMessageFromUI(id);

  if (replyingToId && String(replyingToId) === String(id)) {
    clearReplyPreview();
  }

  closeMenu();
}


async function sendMessage() {
  const text = input.value.trim();

  console.log('[send] clicked', {
    textLength: text.length,
    hasAttachment: !!selectedAttachment,
    isSendingMessage,
    disabled: sendBtn.disabled
  });

  if (isSendingMessage) {
    console.log('[send] ignored (already sending)');
    return;
  }

  if (!currentUserId) {
    alert('الجلسة غير موجودة، سجل الدخول من جديد');
    window.location.href = 'TulinLogin.html';
    return;
  }

  if (!text && !selectedAttachment) return;

  isSendingMessage = true;
  sendBtn.disabled = true;
  sendBtn.style.opacity = '0.5';
  sendBtn.style.pointerEvents = 'none';

  console.log('[send] locked');

  const safetyTimeout = setTimeout(() => {
    console.warn('[send] force unlock (timeout)');
    isSendingMessage = false;
    sendBtn.disabled = false;
    sendBtn.style.opacity = '';
    sendBtn.style.pointerEvents = '';
  }, 15000);

  let optimisticId = null;
  let localPreviewUrl = '';
  let clientId = null;

  try {
    if (editingId) {
      console.log('[send] editing message');

      const { error } = await sb
        .from('chat_messages')
        .update({ content: text })
        .eq('id', editingId)
        .eq('user_id', currentUserId);

      if (error) {
        console.error('[send] edit error:', error);
        alert('فشل تعديل الرسالة');
        return;
      }

      const msg = data.find(m => String(m.id) === String(editingId));
      if (msg) {
        msg.text = text;
        msg.edited = true;
      }

      updateMessageInUI(editingId, text);

      editingId = null;
      input.value = '';
      autoGrowTextarea();
      updateComposerActionButton();
      return;
    }

    let attachmentPath = null;
    let attachmentType = null;

    const fileToSend = selectedAttachment;

    console.log('[send] fileToSend:', fileToSend ? {
      name: fileToSend.name,
      type: fileToSend.type,
      size: fileToSend.size
    } : null);

    clientId = `client-${Date.now()}-${Math.random().toString(36).slice(2)}`;

    if (fileToSend) {
      attachmentType = getAttachmentTypeFromFile(fileToSend);

      if (
        attachmentType !== 'image' &&
        attachmentType !== 'video' &&
        attachmentType !== 'audio'
      ) {
        alert('نربط الصور والفيديو والصوت فقط حاليًا');
        return;
      }

      localPreviewUrl = URL.createObjectURL(fileToSend);
      optimisticId = `temp-${clientId}`;

      const optimisticMsg = {
        id: optimisticId,
        clientId,
        mine: true,
        text,
        time: new Date().toLocaleTimeString('ar', {
          hour: '2-digit',
          minute: '2-digit'
        }),
        createdAt: new Date().toISOString(),
        replyToId: replyingToId || null,
        type: attachmentType,
        file: localPreviewUrl,
        attachmentPath: '',
        fileName: fileToSend.name || '',
        status: 'sending'
      };

      console.log('[send] optimistic message created');

      data.push(optimisticMsg);
      appendMessageToUI(optimisticMsg);

      input.value = '';
      autoGrowTextarea();
      clearReplyPreview();
      clearSelectedAttachment();
      updateComposerActionButton();

      console.log('[send] upload start');
      attachmentPath = await uploadAttachment(fileToSend);
      console.log('[send] upload done:', attachmentPath);
    } else {
      optimisticId = `temp-${clientId}`;

      const optimisticMsg = {
        id: optimisticId,
        clientId,
        mine: true,
        text,
        time: new Date().toLocaleTimeString('ar', {
          hour: '2-digit',
          minute: '2-digit'
        }),
        createdAt: new Date().toISOString(),
        replyToId: replyingToId || null,
        type: 'text',
        file: '',
        attachmentPath: '',
        fileName: '',
        status: 'sending'
      };

      console.log('[send] optimistic text message created');

      data.push(optimisticMsg);
      appendMessageToUI(optimisticMsg);

      input.value = '';
      autoGrowTextarea();
      clearReplyPreview();
      clearSelectedAttachment();
      updateComposerActionButton();
    }

    console.log('[send] insert start');

    const { data: insertedRow, error } = await sb
      .from('chat_messages')
      .insert([
        {
          user_id: currentUserId,
          content: text,
          reply_to_id: replyingToId || null,
          attachment_path: attachmentPath,
          attachment_type: attachmentType,
          client_id: clientId
        }
      ])
      .select(`
        id,
        user_id,
        content,
        sender_name,
        attachment_path,
        attachment_type,
        reply_to_id,
        created_at,
        client_id
      `)
      .single();

    console.log('[send] insert done');

    if (error) {
      console.error('[send] insert error:', error);

      if (optimisticId) {
        const idx = data.findIndex(m => String(m.id) === String(optimisticId));
        if (idx !== -1) data.splice(idx, 1);
        removeMessageFromUI(optimisticId);
      }

      if (localPreviewUrl) {
        URL.revokeObjectURL(localPreviewUrl);
      }

      alert('فشل إرسال الرسالة');
      return;
    }

    // لا نستبدل هنا فورًا بشكل كامل
    // ننتظر realtime ليربط الرسالة الحقيقية بالمؤقتة عبر client_id
    if (insertedRow) {
      console.log('[send] insert succeeded, waiting realtime merge', insertedRow.client_id);
    }

  } catch (err) {
    console.error('[send] unexpected error:', err);

    if (optimisticId) {
      const idx = data.findIndex(m => String(m.id) === String(optimisticId));
      if (idx !== -1) data.splice(idx, 1);
      removeMessageFromUI(optimisticId);
    }

    if (localPreviewUrl) {
      URL.revokeObjectURL(localPreviewUrl);
    }

    alert('حدث خطأ غير متوقع أثناء الإرسال');

  } finally {
    clearTimeout(safetyTimeout);

    isSendingMessage = false;
    sendBtn.disabled = false;
    sendBtn.style.opacity = '';
    sendBtn.style.pointerEvents = '';

    console.log('[send] unlocked');
  }
}
  
function getPoint(e) {
  if (e.touches?.length) {
    return { x: e.touches[0].clientX, y: e.touches[0].clientY };
  }
  if (e.changedTouches?.length) {
    return { x: e.changedTouches[0].clientX, y: e.changedTouches[0].clientY };
  }
  return { x: e.clientX || 0, y: e.clientY || 0 };
}

function clearLongPress() {
  if (longPressTimer) {
    clearTimeout(longPressTimer);
    longPressTimer = null;
  }
}

function resetSwipe(wrap) {
  if (!wrap) return;
  wrap.style.transform = 'translateX(0px)';
  wrap.classList.remove('swiping');
}

function handleSwipeMove(e, wrap) {
  if (!swipeTarget) return;

  const point = getPoint(e);
  const dx = point.x - pressStartX;
  const dy = Math.abs(point.y - pressStartY);

  if (dy > MOVE_CANCEL && !isSwiping) {
    clearLongPress();
    swipeTarget = null;
    resetSwipe(wrap);
    return;
  }

  if (dx > 0) {
    isSwiping = true;
    clearLongPress();
    const move = Math.min(dx, SWIPE_MAX);
    wrap.style.transform = `translateX(${move}px)`;
    wrap.classList.add('swiping');
  }
}

function handleSwipeEnd(wrap, msg) {
  clearLongPress();

  const matrix = new DOMMatrixReadOnly(getComputedStyle(wrap).transform);
  const movedX = matrix.m41 || 0;

  if (movedX >= SWIPE_REPLY_THRESHOLD) {
    openReplyPreview(msg.id);
    if (navigator.vibrate) navigator.vibrate(20);
  }

  resetSwipe(wrap);
  swipeTarget = null;
  isSwiping = false;
}

function bindInteractions(wrap, msg) {
  const start = (e) => {
    const target = e.target;
    if (target.closest('button') || target.closest('input') || target.closest('textarea')) return;

    const p = getPoint(e);
    pressStartX = p.x;
    pressStartY = p.y;
    swipeTarget = wrap;
    isSwiping = false;

    clearLongPress();
    longPressTimer = setTimeout(() => {
      suppressClickUntil = Date.now() + 600;
      openMenu(msg);
      if (navigator.vibrate) navigator.vibrate(18);
    }, LONG_PRESS_MS);
  };

  const move = (e) => handleSwipeMove(e, wrap);
  const end = () => handleSwipeEnd(wrap, msg);
  const cancel = () => {
    clearLongPress();
    resetSwipe(wrap);
    swipeTarget = null;
    isSwiping = false;
  };

  wrap.addEventListener('touchstart', start, { passive: true });
  wrap.addEventListener('touchmove', move, { passive: true });
  wrap.addEventListener('touchend', end);
  wrap.addEventListener('touchcancel', cancel);

  wrap.addEventListener('mousedown', (e) => {
    if (e.button !== 0) return;
    start(e);
  });
  wrap.addEventListener('mousemove', move);
  wrap.addEventListener('mouseup', end);
  wrap.addEventListener('mouseleave', cancel);

  wrap.addEventListener('contextmenu', (e) => e.preventDefault());
  wrap.addEventListener('dragstart', (e) => e.preventDefault());
  wrap.addEventListener('selectstart', (e) => e.preventDefault());

  wrap.addEventListener('click', (e) => {
    if (Date.now() < suppressClickUntil) {
      e.preventDefault();
      e.stopPropagation();
    }
  });
}

function hideKeyboard() {
  if (document.activeElement === input) {
    input.blur();
  }
}

messagesEl.addEventListener('touchstart', hideKeyboard, { passive: true });
messagesEl.addEventListener('scroll', () => {

async function logout() {
  const ok = confirm('هل تريد تسجيل الخروج؟');
  if (!ok) return;

  const { error } = await sb.auth.signOut();

  if (error) {
    console.error('Logout error:', error);
    alert(error.message || 'فشل تسجيل الخروج');
    return;
  }

  window.location.href = 'TulinLogin.html';
}

async function checkSession() {
  const { data: sessionData, error: sessionError } = await sb.auth.getSession();

  if (sessionError) {
    console.error('Session error:', sessionError);
    return false;
  }

  const session = sessionData.session;
  
  if (!session || !session.user || !session.user.email) {
    alert('الجلسة غير موجودة، ارجع لصفحة تسجيل الدخول ثم ادخل من جديد');
    window.location.href = 'TulinLogin.html';
    return false;
  }

  currentUser = session.user;
  currentUserId = session.user.id;

  console.log('User OK:', currentUserId);
  return true;
}

async function loadMessagesFromSupabase() {
  const { data: rows, error } = await sb
    .from('chat_messages')
    .select(`
      id,
      user_id,
      content,
      sender_name,
      attachment_path,
      attachment_type,
      reply_to_id,
      created_at,
      client_id
    `)
    .order('created_at', { ascending: false })
    .limit(50);

  if (error) {
    console.error('Load messages error:', error);
    return;
  }

  console.log('Messages from Supabase:', rows);
  rows.reverse();

  for (const row of rows) {
    rememberReplyMessage(row);
  }

  await hydrateMissingReplyTargets(rows);

  if (rows.length > 0) {
    oldestMessageTime = rows[0].created_at;
  }

  const mapped = await Promise.all(
    rows.map(async (row) => {
      const msg = mapSupabaseRowToMessage(row);
      const hydrated = await hydrateMessageMedia(msg);
      hydrated.clientId = row.client_id || null;
      return hydrated;
    })
  );

  const optimisticMessages = data.filter(msg =>
    String(msg.id).startsWith('temp-')
  );

  const serverClientIds = new Set(
    mapped
      .map(msg => msg.clientId)
      .filter(Boolean)
      .map(String)
  );

  // احتفظ فقط بالرسائل المؤقتة التي لم تصل بعد من السيرفر
  const unresolvedOptimisticMessages = optimisticMessages.filter(msg => {
    if (!msg.clientId) return true;
    return !serverClientIds.has(String(msg.clientId));
  });

  data.length = 0;
  data.push(...mapped, ...unresolvedOptimisticMessages);

  data.sort((a, b) => {
    return new Date(a.createdAt).getTime() - new Date(b.createdAt).getTime();
  });

  renderMessages();
  messagesLoaded = true;
}

function scheduleRealtimeReconnect() {
  if (reconnectTimer) return;

  reconnectTimer = setTimeout(() => {
    reconnectTimer = null;

    if (!currentUserId) return;

    if (channel) {
      try {
        sb.removeChannel(channel);
      } catch (_) {}
      channel = null;
    }

    subscribeToMessages();
  }, 1500);
}

function subscribeToMessages() {
  if (channel && channelState === 'subscribed') return;

  if (channel) {
    try {
      sb.removeChannel(channel);
    } catch (_) {}
    channel = null;
  }

  channelState = 'joining';

  channel = sb
    .channel('chat_messages_realtime')
    .on(
      'postgres_changes',
      {
        event: 'INSERT',
        schema: 'public',
        table: 'chat_messages'
      },
      async (payload) => {
        const row = payload.new;
        if (!row) return;

        const rowClientId = row.client_id || null;
        const mapped = await hydrateMessageMedia(mapSupabaseRowToMessage(row));
        mapped.clientId = rowClientId;

        // 1) لو هذه الرسالة تخص optimistic message عندي
        let optimisticIndex = -1;

        if (rowClientId) {
          optimisticIndex = data.findIndex(
            msg =>
              String(msg.id).startsWith('temp-') &&
              msg.clientId &&
              String(msg.clientId) === String(rowClientId)
          );
        }

        if (optimisticIndex !== -1) {
          const tempMsg = data[optimisticIndex];
          const tempId = String(tempMsg.id);

          // استبدال الرسالة في data
          data[optimisticIndex] = {
            ...mapped,
            status: undefined
          };

          // حذف أي نسخة حقيقية مكررة قد تكون أضيفت سابقًا
          for (let i = data.length - 1; i >= 0; i--) {
            if (i === optimisticIndex) continue;

            const sameRealId = String(data[i].id) === String(mapped.id);
            const sameClientId =
              rowClientId &&
              data[i].clientId &&
              String(data[i].clientId) === String(rowClientId);

            if (sameRealId || sameClientId) {
              const duplicateId = String(data[i].id);
              data.splice(i, 1);
              removeMessageFromUI(duplicateId);
            }
          }

          const tempEl =
            messagesEl.querySelector(`.msg-wrap[data-id="${tempId}"]`) ||
            messagesEl.querySelector(`.msg-wrap[data-client-id="${String(rowClientId)}"]`);

          if (tempEl) {
            const applyReplacement = () => {
              tempEl.dataset.id = String(mapped.id);
          
              if (rowClientId) {
                tempEl.dataset.clientId = String(rowClientId);
              }
          
              tempEl.className = `msg-wrap ${mapped.mine ? 'me' : 'other'}`;
              tempEl.innerHTML = `
                <div class="reply-hint">↩️</div>
                <div class="msg ${mapped.mine ? 'me' : 'other'}">
                  ${renderReplySnippet(mapped)}
                  ${renderMessageContent(mapped)}
                  <div class="msg-meta">
                    ${mapped.edited ? '<span>(تم التعديل)</span>' : ''}
                    <span>${escapeHtml(mapped.time)}</span>
                  </div>
                </div>
              `;
          
              bindInteractions(tempEl, mapped);
              pinToBottomAfterMediaLoads(tempEl);
          
              const replyJumpEl = tempEl.querySelector('[data-jump-to]');
              if (replyJumpEl) {
                replyJumpEl.style.cursor = 'pointer';
                replyJumpEl.addEventListener('click', (e) => {
                  e.stopPropagation();
                  jumpToMessage(replyJumpEl.dataset.jumpTo);
                });
              }
          
              const imageEl = tempEl.querySelector('[data-full-image]');
              if (imageEl) {
                imageEl.addEventListener('click', () => {
                  openMediaViewer('image', imageEl.dataset.fullImage);
                });
              }
          
              const openVideoBtn = tempEl.querySelector('[data-open-video]');
              if (openVideoBtn) {
                openVideoBtn.addEventListener('click', (e) => {
                  e.stopPropagation();
                  openMediaViewer('video', openVideoBtn.dataset.openVideo);
                });
              }
            };
          
            // للصورة: لا نستبدل إلا بعد ما صورة السيرفر تصبح جاهزة
            if (mapped.type === 'image' && mapped.file) {
              try {
                await preloadImage(mapped.file);
                applyReplacement();
              } catch (err) {
                console.warn('Image preload failed, fallback replace:', err);
                applyReplacement();
              }
            } else {
              applyReplacement();
            }
          } else {
            // لو DOM اتغيّر أثناء التحديث، نعيد الرسم مرة واحدة بشكل نظيف
            renderMessages();
          }
          return;
        }

        // 2) إذا الرسالة موجودة أصلًا، لا تضفها مرة ثانية
        const exists = data.some(msg =>
          String(msg.id) === String(row.id) ||
          (rowClientId && msg.clientId && String(msg.clientId) === String(rowClientId))
        );

        if (exists) {
          return;
        }

        // 3) تنظيف أي عنصر DOM مكرر قديم قبل الإضافة
        const existingDomById = messagesEl.querySelector(`.msg-wrap[data-id="${String(row.id)}"]`);
        if (existingDomById) {
          existingDomById.remove();
        }

        if (rowClientId) {
          const existingDomByClientId = messagesEl.querySelector(
            `.msg-wrap[data-client-id="${String(rowClientId)}"]`
          );
          if (existingDomByClientId) {
            existingDomByClientId.remove();
          }
        }

        data.push(mapped);
        appendMessageToUI(mapped);
      }
    )
    .on(
      'postgres_changes',
      {
        event: 'DELETE',
        schema: 'public',
        table: 'chat_messages'
      },
      (payload) => {
        const row = payload.old;
        if (!row) return;

        const idx = data.findIndex(msg => String(msg.id) === String(row.id));
        if (idx !== -1) {
          data.splice(idx, 1);
        }

        removeMessageFromUI(row.id);

        if (replyingToId && String(replyingToId) === String(row.id)) {
          clearReplyPreview();
        }
      }
    )
    .on(
      'postgres_changes',
      {
        event: 'UPDATE',
        schema: 'public',
        table: 'chat_messages'
      },
      (payload) => {
        const row = payload.new;
        if (!row) return;

        updateMessageInData(row.id, row.content || '');
        updateMessageInUI(row.id, row.content || '');
      }
    )
    .subscribe((status) => {
      channelState = String(status || '').toLowerCase();
      console.log('Realtime status:', status);

      if (
        status === 'CHANNEL_ERROR' ||
        status === 'TIMED_OUT' ||
        status === 'CLOSED'
      ) {
        scheduleRealtimeReconnect();
      }
    });
}

async function softSyncMessages() {
  if (!currentUserId) return;

  const { data: rows, error } = await sb
    .from('chat_messages')
    .select(`
      id,
      user_id,
      content,
      sender_name,
      attachment_path,
      attachment_type,
      reply_to_id,
      created_at
    `)
    .order('created_at', { ascending: false })
    .limit(50);

  if (error || !rows) return;

  rows.reverse();

  for (const row of rows) {
    rememberReplyMessage(row);
  }

  await hydrateMissingReplyTargets(rows);

  const hydratedRows = await Promise.all(
    rows.map(async (row) => {
      const mapped = mapSupabaseRowToMessage(row);
      return await hydrateMessageMedia(mapped);
    })
  );

  const serverIds = new Set(hydratedRows.map(msg => String(msg.id)));

  // 1) احذف فقط الرسائل الحقيقية التي لم تعد موجودة على السيرفر
  //    ولا تلمس الرسائل المؤقتة temp-
  const currentRealMessages = data.filter(msg => !String(msg.id).startsWith('temp-'));

  for (const msg of currentRealMessages) {
    const msgId = String(msg.id);
    if (!serverIds.has(msgId)) {
      const idx = data.findIndex(m => String(m.id) === msgId);
      if (idx !== -1) {
        data.splice(idx, 1);
      }

      removeMessageFromUI(msgId);

      if (replyingToId && String(replyingToId) === msgId) {
        clearReplyPreview();
      }
    }
  }

  // 2) أضف أو حدّث الرسائل القادمة من السيرفر بدون لمس temp messages
  for (const serverMsg of hydratedRows) {
    const existingIndex = data.findIndex(
      msg => String(msg.id) === String(serverMsg.id)
    );

    if (existingIndex !== -1) {
      data[existingIndex] = {
        ...data[existingIndex],
        ...serverMsg,
        status: undefined
      };
      continue;
    }

    insertMessageInOrder(serverMsg);
  }

  // 3) رتّب البيانات مع الإبقاء على الرسائل المؤقتة
  data.sort((a, b) => {
    return new Date(a.createdAt).getTime() - new Date(b.createdAt).getTime();
  });
}
  
async function loadOlderMessages() {
  if (isLoadingOlder) return;
  if (!oldestMessageTime) return;

  isLoadingOlder = true;

  const prevScrollHeight = messagesEl.scrollHeight;

  const { data: rows, error } = await sb
    .from('chat_messages')
    .select('*')
    .lt('created_at', oldestMessageTime)
    .order('created_at', { ascending: false })
    .limit(30);

  if (error || !rows || rows.length === 0) {
    isLoadingOlder = false;
    return;
  }

  rows.reverse();

  for (const row of rows) {
    rememberReplyMessage(row);
  }
  
  await hydrateMissingReplyTargets(rows);
  
  oldestMessageTime = rows[0].created_at;
  
  const fragment = document.createDocumentFragment();
  const toPrepend = [];
  
  for (const row of rows) {
    const exists = data.some(msg => String(msg.id) === String(row.id));
    if (exists) continue;
  
    const mapped = await hydrateMessageMedia(mapSupabaseRowToMessage(row));
    toPrepend.push(mapped);
  
    const wrap = document.createElement('div');
    wrap.className = `msg-wrap ${mapped.mine ? 'me' : 'other'}`;
    wrap.dataset.id = String(mapped.id);
  
    wrap.innerHTML = `
      <div class="reply-hint">↩️</div>
      <div class="msg ${mapped.mine ? 'me' : 'other'}">
        ${renderReplySnippet(mapped)}
        ${renderMessageContent(mapped)}
        <div class="msg-meta">
          <span>${escapeHtml(mapped.time)}</span>
        </div>
      </div>
    `;
  
    bindInteractions(wrap, mapped);
    fragment.appendChild(wrap);

    const replyJumpEl = wrap.querySelector('[data-jump-to]');
    if (replyJumpEl) {
      replyJumpEl.style.cursor = 'pointer';
      replyJumpEl.addEventListener('click', (e) => {
        e.stopPropagation();
        jumpToMessage(replyJumpEl.dataset.jumpTo);
      });
    }
  }
  
  if (toPrepend.length > 0) {
    data.unshift(...toPrepend);
    messagesEl.prepend(fragment);
  }

  const newScrollHeight = messagesEl.scrollHeight;
  messagesEl.scrollTop += (newScrollHeight - prevScrollHeight);

  isLoadingOlder = false;
}

  if (!ok) return;

  subscribeToMessages();
